<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS Opportunity Radar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap');
:root {
  --bg:#030508;--surface:#080e14;--surface2:#0d1820;
  --border:#0f2233;--border2:#163247;
  --neon:#00ff88;--neon2:#00d4ff;--orange:#ff6b2b;--red:#ff2d55;
  --text:#c8dde8;--muted:#3a6077;--muted2:#5a8099;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.02) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
.wrap{max-width:1080px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1;}

/* HEADER */
header{padding:32px 0 24px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;border-bottom:1px solid var(--border2);margin-bottom:28px;}
.brand-top{display:flex;align-items:center;gap:12px;}
.pulse-ring{width:34px;height:34px;border:1.5px solid var(--neon);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;}
.pulse-ring::before{content:'';position:absolute;border-radius:50%;border:1px solid var(--neon);animation:ripple 2.5s ease-out infinite;}
@keyframes ripple{0%{width:34px;height:34px;opacity:.5}100%{width:70px;height:70px;opacity:0}}
.pulse-core{width:8px;height:8px;background:var(--neon);border-radius:50%;box-shadow:0 0 8px var(--neon);z-index:1;}
h1{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;color:#fff;line-height:1;}
h1 span{color:var(--neon);}
.brand-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.12em;padding-left:46px;margin-top:4px;}
.badge{font-family:'Space Mono',monospace;font-size:10px;color:var(--neon);border:1px solid rgba(0,255,136,.3);padding:4px 10px;border-radius:4px;display:flex;align-items:center;gap:6px;background:rgba(0,255,136,.05);}
.badge::before{content:'';width:6px;height:6px;background:var(--neon);border-radius:50%;animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0}}

/* PANEL */
.panel{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:20px;margin-bottom:14px;}
.plabel{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:13px;display:flex;align-items:center;gap:8px;}
.plabel::after{content:'';flex:1;height:1px;background:var(--border2);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.g2{grid-template-columns:1fr;}}
.field label{display:block;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:.1em;margin-bottom:5px;}
input[type=text],input[type=password],select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;outline:none;transition:border-color .2s;}
input:focus,select:focus{border-color:var(--neon);}
select option{background:#0d1820;}

/* CHIPS */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.chip{padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s;}
.chip:hover{border-color:var(--neon2);color:var(--neon2);}
.chip.on{border-color:var(--neon);color:var(--neon);background:rgba(0,255,136,.08);}

/* ACTIONS */
.action-row{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
.btn{padding:12px 22px;border-radius:9px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;}
.btn-primary{background:var(--neon);color:#000;flex:1;}
.btn-primary:hover{background:#2fffaa;box-shadow:0 6px 20px rgba(0,255,136,.3);transform:translateY(-1px);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-sec{background:transparent;border:1px solid var(--border2);color:var(--muted2);}
.btn-sec:hover{border-color:var(--neon2);color:var(--neon2);}
.btn-excel{background:transparent;border:1px solid rgba(0,255,136,.4);color:var(--neon);font-size:13px;}
.btn-excel:hover{background:rgba(0,255,136,.1);}

/* PROGRESS */
.prog-wrap{display:none;margin-bottom:22px;}
.prog-wrap.show{display:block;}
.prog-track{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:13px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--neon),var(--neon2));border-radius:3px;width:0%;transition:width .4s ease;box-shadow:0 0 10px var(--neon);}
.log-box{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;font-family:'Space Mono',monospace;font-size:11px;max-height:120px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
.ll{display:flex;gap:8px;line-height:1.5;}
.ll .t{color:var(--muted);flex-shrink:0;}
.ll .m{color:var(--text);}
.ll.ok .m{color:var(--neon);}
.ll.err .m{color:var(--red);}
.ll.info .m{color:var(--neon2);}

/* RESULTS HEADER */
.res-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.res-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff;}
.res-count{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted2);margin-top:3px;}
.sort-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.sbtn{padding:5px 11px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s;}
.sbtn.on{border-color:var(--orange);color:var(--orange);background:rgba(255,107,43,.1);}
.ideas-grid{display:flex;flex-direction:column;gap:13px;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:20px;transition:all .22s;position:relative;overflow:hidden;animation:cin .35s ease both;}
@keyframes cin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--neon),var(--neon2));opacity:0;transition:opacity .22s;}
.card:hover{border-color:rgba(0,255,136,.25);transform:translateY(-2px);box-shadow:0 6px 28px rgba(0,0,0,.35);}
.card:hover::before{opacity:1;}
.card:hover .rank{color:var(--neon);}

.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:14px;}
.rank{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;color:var(--border2);flex-shrink:0;width:48px;text-align:center;transition:color .2s;}
.cmain{flex:1;}
.ccat{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.2em;color:var(--neon2);text-transform:uppercase;margin-bottom:4px;}
.ctitle{font-size:18px;font-weight:600;color:#fff;line-height:1.3;margin-bottom:6px;}
.cdesc{font-size:13px;color:var(--muted2);line-height:1.6;}
.cright{text-align:right;flex-shrink:0;}
.cmrr{font-family:'Bebas Neue',sans-serif;font-size:25px;letter-spacing:1px;color:var(--neon);}
.cmrr-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);}
.cmvp{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px;}

/* SOURCE BADGE */
.source-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:4px;font-family:'Space Mono',monospace;font-size:9px;margin-top:6px;border:1px solid;}
.src-twitter{background:rgba(0,212,255,.08);color:var(--neon2);border-color:rgba(0,212,255,.2);}
.src-reddit{background:rgba(255,107,43,.08);color:var(--orange);border-color:rgba(255,107,43,.2);}
.src-appstore{background:rgba(0,255,136,.08);color:var(--neon);border-color:rgba(0,255,136,.2);}
.src-indiehackers{background:rgba(180,120,255,.08);color:#b47fff;border-color:rgba(180,120,255,.2);}
.src-producthunt{background:rgba(255,80,40,.08);color:#ff5028;border-color:rgba(255,80,40,.2);}

/* SCORES */
.scores{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:13px;padding-top:13px;border-top:1px solid var(--border);}
@media(max-width:520px){.scores{grid-template-columns:repeat(2,1fr);}}
.si{display:flex;flex-direction:column;gap:5px;}
.slbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.08em;}
.sbg{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.sb{height:100%;border-radius:2px;}
.sv{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;}
.s-comp .sb{background:var(--red);} .s-comp .sv{color:var(--red);}
.s-mrr .sb{background:var(--neon);} .s-mrr .sv{color:var(--neon);}
.s-eff .sb{background:var(--orange);} .s-eff .sv{color:var(--orange);}
.s-opp .sb{background:var(--neon2);} .s-opp .sv{color:var(--neon2);}

/* INSIGHTS */
.insights{display:none;flex-direction:column;gap:9px;margin-top:13px;padding-top:13px;border-top:1px solid var(--border);}
.card.open .insights{display:flex;}
.irow{display:flex;gap:9px;align-items:flex-start;}
.iico{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:2px;}
.itxt{font-size:12px;color:var(--text);line-height:1.55;}
.itxt strong{color:#fff;font-weight:600;}
.src-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-left:4px;text-transform:uppercase;}

.cfoot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:7px;}
.tags{display:flex;gap:5px;flex-wrap:wrap;}
.tbtn{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s;}
.tbtn:hover{border-color:var(--neon2);color:var(--neon2);}

/* EMPTY */
.empty{text-align:center;padding:72px 24px;display:none;}
.empty.show{display:block;}
.empty-ico{font-size:44px;margin-bottom:14px;opacity:.45;}
.empty-t{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--muted2);}
.empty-s{font-size:13px;color:var(--muted);margin-top:6px;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--surface2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="brand">
    <div class="brand-top">
      <div class="pulse-ring"><div class="pulse-core"></div></div>
      <h1>iOS OPPORTUNITY <span>RADAR</span></h1>
    </div>
    <div class="brand-sub">// Twitter · Reddit · App Store · Indie Hackers → Claude AI → MRR Fırsatları</div>
  </div>
  <div class="badge">SYS ONLINE</div>
</header>

<div class="panel">
  <div class="plabel">API & Ayarlar</div>
  <div class="g2" style="margin-bottom:12px">
    <div class="field">
      <label>CLAUDE API KEY</label>
      <input type="password" id="claudeKey" placeholder="sk-ant-api03-...">
    </div>
    <div class="field">
      <label>SERP API KEY <span style="color:var(--muted);font-size:9px">(opsiyonel)</span></label>
      <input type="password" id="serpKey" placeholder="Boş = Claude bilgisi, dolu = gerçek web verisi">
    </div>
  </div>
  <div class="g2">
    <div class="field">
      <label>HEDEF PAZAR</label>
      <select id="market">
        <option value="Global">🌍 Global</option>
        <option value="US">🇺🇸 US Market</option>
        <option value="Europe">🇪🇺 Europe</option>
        <option value="Asia">🌏 Asia Pacific</option>
      </select>
    </div>
    <div class="field" style="display:flex;align-items:flex-end">
      <div id="modeBox" style="width:100%;padding:9px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);font-family:'Space Mono',monospace;font-size:11px;color:var(--muted2)">
        🧠 Mod: Claude bilgisi
      </div>
    </div>
  </div>
</div>

<div class="panel">
  <div class="plabel">Tarama Hedefi</div>
  <div class="g2" style="margin-bottom:14px">
    <div class="field">
      <label>ÖZEL NİCHE (opsiyonel)</label>
      <input type="text" id="niche" placeholder="örn: longevity, B2B SaaS, crypto...">
    </div>
    <div class="field">
      <label>MRR HEDEFİ</label>
      <select id="mrr">
        <option value="$10K">$10K+</option>
        <option value="$50K" selected>$50K+</option>
        <option value="$100K">$100K+</option>
        <option value="$500K">$500K+</option>
      </select>
    </div>
  </div>
  <div class="field">
    <label>KATEGORİ SEÇ (birden fazla seçilebilir)</label>
    <div class="chips" id="chipArea">
      <button class="chip on"  data-cat="AI Tools">🤖 AI Tools</button>
      <button class="chip on"  data-cat="Health & Fitness">💪 Health & Fitness</button>
      <button class="chip on"  data-cat="Personal Finance">💰 Finance</button>
      <button class="chip"     data-cat="Productivity">⚡ Productivity</button>
      <button class="chip"     data-cat="Mental Health">🧠 Mental Health</button>
      <button class="chip"     data-cat="Education & Learning">📚 Education</button>
      <button class="chip"     data-cat="Dating & Relationships">💬 Dating</button>
      <button class="chip"     data-cat="Travel & Navigation">✈️ Travel</button>
      <button class="chip"     data-cat="Pets & Animals">🐾 Pets</button>
      <button class="chip"     data-cat="Creator & Content Tools">🎨 Creator</button>
      <button class="chip"     data-cat="Home & Real Estate">🏠 Home</button>
      <button class="chip"     data-cat="Food & Nutrition">🥗 Food</button>
      <button class="chip"     data-cat="Sleep & Recovery">😴 Sleep</button>
      <button class="chip"     data-cat="Business & B2B">💼 B2B</button>
      <button class="chip"     data-cat="Crypto & Web3">₿ Crypto</button>
      <button class="chip"     data-cat="Sports & Outdoor">🏃 Sports</button>
      <button class="chip"     data-cat="Parenting & Kids">👶 Parenting</button>
      <button class="chip"     data-cat="Career & Job Search">🎯 Career</button>
      <button class="chip"     data-cat="Photography & Video">📸 Photo/Video</button>
      <button class="chip"     data-cat="Gaming & Entertainment">🎮 Gaming</button>
      <button class="chip"     data-cat="Sustainability & Environment">🌱 Green Tech</button>
      <button class="chip"     data-cat="Senior & Accessibility">👴 Seniors</button>
    </div>
  </div>
</div>

<div class="action-row">
  <button class="btn btn-sec" onclick="clearAll()" title="Temizle">🗑</button>
  <button class="btn btn-excel" id="btnExcel" onclick="exportExcel()" style="display:none">📊 Excel İndir</button>
  <button class="btn btn-primary" id="btnScan" onclick="scan()">
    <span id="bico">⚡</span><span id="btxt">FIRSAT TARA</span>
  </button>
</div>

<div class="prog-wrap" id="pw">
  <div class="prog-track"><div class="prog-fill" id="pf"></div></div>
  <div class="log-box" id="lb"></div>
</div>

<div id="rs" style="display:none">
  <div class="res-header">
    <div>
      <div class="res-title">BULUNAN FIRSATLAR</div>
      <div class="res-count" id="rc"></div>
    </div>
  </div>
  <div class="sort-row">
    <button class="sbtn on" id="so" onclick="doSort('opportunityScore','so')">⬆ Fırsat</button>
    <button class="sbtn"    id="sm" onclick="doSort('mrrScore','sm')">💰 MRR</button>
    <button class="sbtn"    id="sc" onclick="doSort('competitionScore','sc')">🎯 Az Rekabet</button>
  </div>
  <div class="ideas-grid" id="ig"></div>
</div>

<div class="empty show" id="es">
  <div class="empty-ico">📡</div>
  <div class="empty-t">SINYAL BEKLENİYOR</div>
  <div class="empty-s">API key gir · kategori seç · tara</div>
</div>

</div><!-- wrap -->

<script>
let ideas = [], scanning = false;

document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => c.classList.toggle('on')));

function lg(msg, type='') {
  const b = document.getElementById('lb');
  const d = document.createElement('div');
  d.className = 'll ' + type;
  const t = new Date().toLocaleTimeString('tr',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  d.innerHTML = `<span class="t">[${t}]</span><span class="m">${msg}</span>`;
  b.appendChild(d); b.scrollTop = b.scrollHeight;
}
function sp(p) { document.getElementById('pf').style.width = p + '%'; }

// Update mode indicator when serpKey changes
document.addEventListener('DOMContentLoaded', () => {
  const sk = document.getElementById('serpKey');
  if (sk) sk.addEventListener('input', updateMode);
});
function updateMode() {
  const hasSerpKey = document.getElementById('serpKey')?.value.trim();
  const box = document.getElementById('modeBox');
  if (!box) return;
  if (hasSerpKey) {
    box.style.color = 'var(--orange)';
    box.style.borderColor = 'rgba(255,107,43,.4)';
    box.textContent = '🔍 Mod: SerpAPI + Claude (gerçek veri)';
  } else {
    box.style.color = 'var(--muted2)';
    box.style.borderColor = 'var(--border2)';
    box.textContent = '🧠 Mod: Claude bilgisi';
  }
}

// SerpAPI search via proxy
async function serpSearch(serpKey, query) {
  const r = await fetch('/api/serp', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ serpKey, query, num: 8 })
  });
  if (!r.ok) throw new Error('SerpAPI proxy hatası: ' + r.status);
  const d = await r.json();
  return (d.organic_results || []).map(x => '• ' + x.title + ': ' + (x.snippet||'')).join('\n');
}

// Source config
const SOURCE_META = {
  twitter:      { label: 'Twitter/X',      cls: 'src-twitter',      ico: '𝕏',  bg: 'rgba(0,212,255,.1)'  },
  reddit:       { label: 'Reddit',          cls: 'src-reddit',       ico: '📋', bg: 'rgba(255,107,43,.1)' },
  appstore:     { label: 'App Store',       cls: 'src-appstore',     ico: '📱', bg: 'rgba(0,255,136,.1)'  },
  indiehackers: { label: 'Indie Hackers',   cls: 'src-indiehackers', ico: '🚀', bg: 'rgba(180,120,255,.1)'},
  producthunt:  { label: 'Product Hunt',    cls: 'src-producthunt',  ico: '🔍', bg: 'rgba(255,80,40,.1)'  },
};

async function callClaude(prompt) {
  const key = document.getElementById('claudeKey').value.trim();
  if (!key) throw new Error('Claude API key girilmedi');
  const r = await fetch('/api/claude', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      userKey: key,
      model:'claude-sonnet-4-20250514',
      max_tokens:5000,
      messages:[{role:'user',content:prompt}]
    })
  });
  if (!r.ok) {
    const e = await r.json().catch(()=>({}));
    throw new Error(e.error?.message || `HTTP ${r.status}`);
  }
  const d = await r.json();
  return d.content.map(b => b.type==='text' ? b.text : '').join('\n');
}

function makePrompt(catSlice, niche, mrr, market) {
  const focus = niche ? [niche, ...catSlice.slice(0,2)] : catSlice;
  const catStr = focus.join(', ');
  return `You are an expert iOS app market analyst. Based on your knowledge of Twitter/X, Reddit, App Store reviews, Indie Hackers, and Product Hunt data up to early 2025, identify 4 high-potential iOS app opportunities.

Categories: ${catStr}
Market: ${market}
MRR target: ${mrr}

Key criteria — weight these heavily:
- LOW competition: few quality iOS apps, poor reviews on existing ones, outdated solutions
- HIGH demand: real user pain points, vocal communities, repeat requests
- GOOD ROI: can be built by 1-2 devs in under 6 months, clear monetization path
- STRONG signal: evidence from multiple sources (Twitter complaints, Reddit requests, App Store gaps)

For each idea, cite which SPECIFIC SOURCE(S) the demand signal came from (twitter, reddit, appstore, indiehackers, producthunt).

Return ONLY a raw JSON array, no markdown, no explanation. Exactly 4 objects:
[
  {
    "title": "Specific app name",
    "category": "Category",
    "description": "2 sentences: what it does and why there is a gap right now",
    "mrrPotential": "$XXK-$XXXK",
    "competitionScore": <5-80, lower=less competition>,
    "mrrScore": <20-95, higher=more revenue>,
    "effortScore": <15-85, lower=easier to build>,
    "opportunityScore": <20-99>,
    "primarySource": "<one of: twitter|reddit|appstore|indiehackers|producthunt>",
    "twitterSignal": "Specific Twitter/X demand signal you know about",
    "redditSignal": "Specific Reddit pain point — mention subreddit if known",
    "appStoreGap": "What current App Store apps fail at for this niche",
    "indieHackerSignal": "Any Indie Hackers / Product Hunt signal for this type of app",
    "monetization": "Exact price and model e.g. $9.99/mo subscription + free tier",
    "targetUser": "Specific persona with demographics",
    "timeToMvp": "e.g. 2-3 months solo dev",
    "competitorWeakness": "Why existing solutions are beatable",
    "sources": ["twitter","reddit","appstore"]
  }
]`;
}

function parseJSON(raw) {
  let s = raw.replace(/```json/gi,'').replace(/```/g,'').trim();
  const a = s.indexOf('['), b = s.lastIndexOf(']');
  if (a===-1 || b===-1) return [];
  try { return JSON.parse(s.slice(a, b+1)); } catch { return []; }
}

async function scan() {
  if (scanning) return;
  const key = document.getElementById('claudeKey').value.trim();
  if (!key) { alert('Claude API key gerekli!'); return; }
  const cats = [...document.querySelectorAll('.chip.on')].map(c=>c.dataset.cat);
  const niche = document.getElementById('niche').value.trim();
  const mrr   = document.getElementById('mrr').value;
  const mkt   = document.getElementById('market').value;
  if (!cats.length && !niche) { alert('Kategori seç veya niche yaz!'); return; }

  scanning = true;
  document.getElementById('btnScan').disabled = true;
  document.getElementById('bico').textContent = '⏳';
  document.getElementById('btxt').textContent = 'TARANYOR...';
  document.getElementById('btnExcel').style.display = 'none';
  document.getElementById('pw').classList.add('show');
  document.getElementById('es').classList.remove('show');
  document.getElementById('rs').style.display = 'none';
  document.getElementById('lb').innerHTML = '';
  sp(0);

  try {
    // Split categories across 2 batches
    const all_cats = niche ? [niche,...cats] : cats;
    const mid = Math.ceil(all_cats.length / 2);
    const b1 = all_cats.slice(0, mid);
    const b2 = all_cats.slice(mid).length ? all_cats.slice(mid) : all_cats;

    lg(`Batch 1: ${b1.join(', ')}`, 'info');
    lg(`Batch 2: ${b2.join(', ')}`, 'info');
    lg('İki paralel analiz başlatılıyor...', 'info');
    sp(15);

    const [r1, r2] = await Promise.all([
      callClaude(makePrompt(b1, '', mrr, mkt)),
      callClaude(makePrompt(b2, '', mrr, mkt))
    ]);

    sp(82);
    lg(`Batch 1: ${r1.length} karakter alındı`, 'ok');
    lg(`Batch 2: ${r2.length} karakter alındı`, 'ok');

    let parsed = [...parseJSON(r1), ...parseJSON(r2)];
    lg(`Parse edilen: ${parsed.length} fikir`, parsed.length ? 'ok' : 'info');

    if (!parsed.length) {
      lg('JSON temizleniyor, retry...', 'info');
      sp(88);
      const fix = await callClaude(
        `Extract all JSON objects from these two API responses and return them as a single clean JSON array. Output ONLY the array.\n\nRESPONSE 1:\n${r1}\n\nRESPONSE 2:\n${r2}`
      );
      parsed = parseJSON(fix);
      lg(`Retry sonucu: ${parsed.length} fikir`, parsed.length ? 'ok' : 'err');
    }

    if (!parsed.length) throw new Error('JSON parse başarısız. API key doğru mu?');

    // Deduplicate
    const seen = new Set();
    ideas = parsed.filter(x => {
      if (!x.title || seen.has(x.title)) return false;
      seen.add(x.title); return true;
    }).sort((a,b)=>(b.opportunityScore||0)-(a.opportunityScore||0));

    lg(`✓ ${ideas.length} fırsat bulundu!`, 'ok');
    sp(100);
    render();
    document.getElementById('btnExcel').style.display = 'flex';
    setTimeout(()=>document.getElementById('pw').classList.remove('show'), 1800);

  } catch(e) {
    lg('HATA: ' + e.message, 'err');
    console.error(e);
  } finally {
    scanning = false;
    document.getElementById('btnScan').disabled = false;
    document.getElementById('bico').textContent = '⚡';
    document.getElementById('btxt').textContent = document.getElementById('serpKey')?.value.trim() ? 'GERÇEK VERİYLE TARA' : 'FIRSAT TARA';
  }
}

function doSort(field, btnId) {
  ['so','sm','sc'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById(btnId).classList.add('on');
  if (field==='competitionScore') ideas.sort((a,b)=>(a[field]||50)-(b[field]||50));
  else ideas.sort((a,b)=>(b[field]||0)-(a[field]||0));
  render(false);
}

function sourceTags(sources) {
  if (!sources || !sources.length) return '';
  return sources.map(s => {
    const m = SOURCE_META[s] || {label:s, cls:'src-twitter', ico:'•'};
    return `<span class="source-badge ${m.cls}">${m.ico} ${m.label}</span>`;
  }).join('');
}

function render(anim=true) {
  document.getElementById('rs').style.display = 'block';
  document.getElementById('es').classList.remove('show');
  const mkt = document.getElementById('market').value;
  const mrr = document.getElementById('mrr').value;
  const mode = document.getElementById('serpKey')?.value.trim() ? '🔍 SerpAPI + Claude (gerçek veri)' : '🧠 Claude bilgisi';
  document.getElementById('rc').textContent = `${ideas.length} fırsat · ${mkt} · ${mrr} hedef · ${mode}`;

  document.getElementById('ig').innerHTML = ideas.map((d,i) => {
    const psrc = SOURCE_META[d.primarySource] || SOURCE_META.twitter;
    return `
    <div class="card" id="c${i}" style="${anim?`animation-delay:${i*.07}s`:'animation:none'}">
      <div class="ctop">
        <div class="rank">${String(i+1).padStart(2,'0')}</div>
        <div class="cmain">
          <div class="ccat">${d.category||''}</div>
          <div class="ctitle">${d.title||''}</div>
          <div class="cdesc">${d.description||''}</div>
          <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px;align-items:center">
            <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);">KAYNAK:</span>
            ${sourceTags(d.sources||[d.primarySource||'twitter'])}
          </div>
        </div>
        <div class="cright">
          <div class="cmrr">${d.mrrPotential||'—'}</div>
          <div class="cmrr-lbl">MRR POTANSİYEL</div>
          ${d.timeToMvp?`<div class="cmvp">⏱ ${d.timeToMvp}</div>`:''}
          <div class="cmvp" style="margin-top:5px">
            <span class="source-badge ${psrc.cls}" style="display:inline-flex">${psrc.ico} Güçlü Sinyal</span>
          </div>
        </div>
      </div>

      <div class="scores">
        <div class="si s-comp"><div class="slbl">Rekabet ↓ iyi</div><div class="sbg"><div class="sb" style="width:${d.competitionScore||50}%"></div></div><div class="sv">${d.competitionScore||'?'}/100</div></div>
        <div class="si s-mrr"><div class="slbl">Gelir Potansiyeli</div><div class="sbg"><div class="sb" style="width:${d.mrrScore||50}%"></div></div><div class="sv">${d.mrrScore||'?'}/100</div></div>
        <div class="si s-eff"><div class="slbl">Efor ↓ iyi</div><div class="sbg"><div class="sb" style="width:${d.effortScore||50}%"></div></div><div class="sv">${d.effortScore||'?'}/100</div></div>
        <div class="si s-opp"><div class="slbl">Fırsat Skoru</div><div class="sbg"><div class="sb" style="width:${d.opportunityScore||50}%"></div></div><div class="sv">${d.opportunityScore||'?'}/100</div></div>
      </div>

      <div class="insights">
        <div class="irow">
          <div class="iico" style="background:${SOURCE_META.twitter.bg}">𝕏</div>
          <div class="itxt"><strong>Twitter/X Sinyali</strong><span class="src-label src-twitter">twitter</span><br>${d.twitterSignal||'N/A'}</div>
        </div>
        <div class="irow">
          <div class="iico" style="background:${SOURCE_META.reddit.bg}">📋</div>
          <div class="itxt"><strong>Reddit Pain Point</strong><span class="src-label src-reddit">reddit</span><br>${d.redditSignal||'N/A'}</div>
        </div>
        <div class="irow">
          <div class="iico" style="background:${SOURCE_META.appstore.bg}">📱</div>
          <div class="itxt"><strong>App Store Boşluğu</strong><span class="src-label src-appstore">app store</span><br>${d.appStoreGap||'N/A'}</div>
        </div>
        <div class="irow">
          <div class="iico" style="background:${SOURCE_META.indiehackers.bg}">🚀</div>
          <div class="itxt"><strong>Indie Hackers / Product Hunt</strong><span class="src-label src-indiehackers">indie hackers</span><br>${d.indieHackerSignal||'N/A'}</div>
        </div>
        <div class="irow">
          <div class="iico" style="background:rgba(255,255,136,.08)">⚔️</div>
          <div class="itxt"><strong>Rakip Zayıflığı:</strong> ${d.competitorWeakness||'N/A'}</div>
        </div>
        <div class="irow">
          <div class="iico" style="background:rgba(255,255,255,.04)">💳</div>
          <div class="itxt"><strong>Monetizasyon:</strong> ${d.monetization||'N/A'}</div>
        </div>
        <div class="irow">
          <div class="iico" style="background:rgba(255,255,255,.04)">🎯</div>
          <div class="itxt"><strong>Hedef Kullanıcı:</strong> ${d.targetUser||'N/A'}</div>
        </div>
      </div>

      <div class="cfoot">
        <div class="tags">${sourceTags(d.sources||['twitter','reddit','appstore'])}</div>
        <button class="tbtn" onclick="tog(${i},this)">▼ Detay</button>
      </div>
    </div>`;
  }).join('');
}

function tog(i, btn) {
  const c = document.getElementById('c'+i);
  c.classList.toggle('open');
  btn.textContent = c.classList.contains('open') ? '▲ Gizle' : '▼ Detay';
}

// ── EXCEL EXPORT ──
function exportExcel() {
  if (!ideas.length) return;

  const wb = XLSX.utils.book_new();

  // Sheet 1: Summary
  const summaryHeaders = [
    'Sıra','Uygulama Adı','Kategori','MRR Potansiyeli','Fırsat Skoru',
    'Rekabet (↓ iyi)','Gelir Skoru','Efor (↓ iyi)','MVP Süresi',
    'Güçlü Kaynak','Kaynaklar'
  ];
  const summaryRows = ideas.map((d,i) => [
    i+1,
    d.title||'',
    d.category||'',
    d.mrrPotential||'',
    d.opportunityScore||'',
    d.competitionScore||'',
    d.mrrScore||'',
    d.effortScore||'',
    d.timeToMvp||'',
    d.primarySource||'',
    (d.sources||[]).join(', ')
  ]);
  const ws1 = XLSX.utils.aoa_to_sheet([summaryHeaders, ...summaryRows]);
  ws1['!cols'] = [4,28,20,18,14,14,12,10,16,16,28].map(w=>({wch:w}));
  styleHeader(ws1, summaryHeaders.length);
  XLSX.utils.book_append_sheet(wb, ws1, 'Özet');

  // Sheet 2: Detailed signals
  const detailHeaders = [
    'Uygulama Adı','Twitter/X Sinyali','Reddit Pain Point','App Store Boşluğu',
    'Indie Hackers Sinyali','Rakip Zayıflığı','Monetizasyon','Hedef Kullanıcı','Açıklama'
  ];
  const detailRows = ideas.map(d => [
    d.title||'',
    d.twitterSignal||'',
    d.redditSignal||'',
    d.appStoreGap||'',
    d.indieHackerSignal||'',
    d.competitorWeakness||'',
    d.monetization||'',
    d.targetUser||'',
    d.description||''
  ]);
  const ws2 = XLSX.utils.aoa_to_sheet([detailHeaders, ...detailRows]);
  ws2['!cols'] = [22,40,40,36,36,36,30,30,50].map(w=>({wch:w}));
  styleHeader(ws2, detailHeaders.length);
  XLSX.utils.book_append_sheet(wb, ws2, 'Kaynak Sinyalleri');

  // Sheet 3: Scores
  const scoreHeaders = ['Uygulama Adı','Fırsat Skoru','Rekabet Skoru','Gelir Skoru','Efor Skoru','MRR Potansiyeli','Kategori'];
  const scoreRows = [...ideas].sort((a,b)=>(b.opportunityScore||0)-(a.opportunityScore||0)).map(d=>[
    d.title||'',
    d.opportunityScore||0,
    d.competitionScore||0,
    d.mrrScore||0,
    d.effortScore||0,
    d.mrrPotential||'',
    d.category||''
  ]);
  const ws3 = XLSX.utils.aoa_to_sheet([scoreHeaders, ...scoreRows]);
  ws3['!cols'] = [26,14,14,12,12,18,22].map(w=>({wch:w}));
  styleHeader(ws3, scoreHeaders.length);
  XLSX.utils.book_append_sheet(wb, ws3, 'Skor Karşılaştırma');

  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `ios-firsatlar-${date}.xlsx`);
}

function styleHeader(ws, colCount) {
  for (let c = 0; c < colCount; c++) {
    const addr = XLSX.utils.encode_cell({r:0, c});
    if (!ws[addr]) continue;
    ws[addr].s = {
      font: { bold: true, color: { rgb: 'FFFFFF' } },
      fill: { fgColor: { rgb: '0A1628' } },
      alignment: { horizontal: 'center', wrapText: true }
    };
  }
}

function clearAll() {
  ideas = [];
  document.getElementById('rs').style.display = 'none';
  document.getElementById('ig').innerHTML = '';
  document.getElementById('lb').innerHTML = '';
  document.getElementById('pf').style.width = '0%';
  document.getElementById('pw').classList.remove('show');
  document.getElementById('btnExcel').style.display = 'none';
  document.getElementById('es').classList.add('show');
}
</script>
